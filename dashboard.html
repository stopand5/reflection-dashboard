const movAvgPoints = (() => {
  const valid = entries.filter(e => e.positivity !== null);
  return valid.map((e, i) => {
    const slice = valid.slice(Math.max(0, i - 4), i + 1);
    const avg = slice.reduce((a, b) => a + b.positivity, 0) / slice.length;
    return { x: e.date, y: Math.round(avg * 10) / 10 };
  });
})();

const ctx = document.getElementById('posiChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      {
        label: '気分スコア',
        data: posiPoints,
        borderColor: '#e8a020',
        backgroundColor: 'rgba(232,160,32,0.12)',
        pointBackgroundColor: posiPoints.map(p =>
          p.y >= 4 ? '#27ae60' : p.y <= 2 ? '#e74c3c' : '#e8a020'
        ),
        pointRadius: 6,
        pointHoverRadius: 8,
        tension: 0.5,
        fill: true,
        order: 2,
      },
      {
        label: '移動平均（7件）',
        data: movAvgPoints,
        borderColor: '#3498db',
        pointRadius: 0,
        tension: 0,
        fill: false,
        order: 1,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: {
        min: 0.5, max: 5.5,
        ticks: {
          stepSize: 1,
          callback: v => ['','⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐⭐'][v] || '',
        },
        grid: { color: 'rgba(0,0,0,0.06)' },
      },
      x: {
        type: 'time',
        time: {
          unit: 'day',
          tooltipFormat: 'yyyy/MM/dd',
          displayFormats: { day: 'M/d', month: 'yyyy/M' },
        },
        ticks: { maxRotation: 45, font: { size: 10 }, autoSkip: true, maxTicksLimit: 20 },
        grid: { display: false },
      }
    },
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 12 } } },
      tooltip: {
        callbacks: {
          title: ctx => ctx[0].raw.x || '',
          label: ctx => {
            const p = ctx.raw;
            if (!p._meta) return '移動平均: ' + p.y;
            return [
              '気分スコア: ' + (p._meta.posiLabel || '-'),
              '主感情: ' + (p._meta.emotion || '-'),
              p._meta.title,
            ];
          }
        }
      }
    }
  }
});
