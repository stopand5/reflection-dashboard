<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リフレクション ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
  h1 { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
  .meta { font-size: 12px; color: #888; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
  .card h2 { font-size: 15px; font-weight: bold; margin-bottom: 16px; color: #444; }
  .chart-wrap { position: relative; height: 320px; }
  .tooltip-box { background: rgba(40,40,40,0.92); color: #fff; border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.8; max-width: 220px; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: #f9f9f9; border-radius: 8px; padding: 12px 18px; text-align: center; }
  .stat .num { font-size: 28px; font-weight: bold; color: #e8a020; }
  .stat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
<h1>📓 リフレクション ダッシュボード</h1>
<p class="meta">更新: 2026/6/19 23:37:18　｜　全46件</p>

<div class="card">
  <div class="stats">
    <div class="stat"><div class="num">46</div><div class="lbl">総エントリ数</div></div>
    <div class="stat"><div class="num">3.7</div><div class="lbl">平均ポジ度</div></div>
    <div class="stat"><div class="num">5</div><div class="lbl">最高ポジ度</div></div>
    <div class="stat"><div class="num">2</div><div class="lbl">最低ポジ度</div></div>
  </div>
</div>

<div class="card">
  <h2>ポジ度の時系列推移</h2>
  <div class="chart-wrap">
    <canvas id="posiChart"></canvas>
  </div>
</div>

<div class="card">
  <h2>月別 感情比率（帯グラフ）</h2>
  <div class="chart-wrap">
    <canvas id="emotionChart"></canvas>
  </div>
</div>

<script>
// 日付をキーにしてメタ情報を引けるようにする
const entries = [{"date":"2026-01-04","title":"AIの可能性とワクワク感","posiLabel":"⭐⭐⭐⭐⭐","emotion":"恍惚（喜びの強）","positivity":5},{"date":"2026-01-05","title":"仕事始め・資料作成のもどかしさ・保育園見学","posiLabel":"⭐⭐⭐","emotion":"不満（怒りの弱）","positivity":3},{"date":"2026-01-06","title":"仕事モードへの復帰・キャリア模索","posiLabel":"⭐⭐⭐","emotion":"不安（恐れの弱）","positivity":3},{"date":"2026-01-08","title":"コーチング・勉強会・データビジュアライゼーションのアイデア","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-01-11","title":"万葉の湯・Vision to Value の構想","posiLabel":"⭐⭐⭐⭐","emotion":"関心（期待の弱）","positivity":4},{"date":"2026-01-12","title":"水族館・シンガポール出発","posiLabel":"⭐⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":5},{"date":"2026-01-13","title":"シンガポール到着初日・異文化と自己理解","posiLabel":"⭐⭐⭐⭐","emotion":"受容（信頼の弱）","positivity":4},{"date":"2026-01-14","title":"シンガポールセッション初日・「もう一つの柱」への決意","posiLabel":"⭐⭐⭐","emotion":"物悲しさ（悲しみの弱）","positivity":3},{"date":"2026-01-17","title":"太田さんとの対話・キャリアの問い直し（帰路）","posiLabel":"⭐⭐⭐⭐","emotion":"信頼（信頼の中）","positivity":4},{"date":"2026-01-17","title":"帰国後の日常・後回し習慣・リフォーム","posiLabel":"⭐⭐⭐","emotion":"不満（怒りの弱）","positivity":3},{"date":"2026-01-19","title":"学校の夢・人と会える「大きな庭」","posiLabel":"⭐⭐⭐⭐","emotion":"穏やかさ（喜びの弱）","positivity":4},{"date":"2026-01-21","title":"停滞感・ジャーナリング継続の手応え","posiLabel":"⭐⭐","emotion":"悲しみ（悲しみの中）","positivity":2},{"date":"2026-01-22","title":"専門性への不安・AIジャーナリングの可能性","posiLabel":"⭐⭐⭐","emotion":"不安（恐れの弱）","positivity":3},{"date":"2026-01-24","title":"ホームパーティー・スキー欲の再燃","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-01-27","title":"強みの再認識・切り替えポイントへの決意","posiLabel":"⭐⭐⭐⭐","emotion":"期待（期待の中）","positivity":4},{"date":"2026-01-29","title":"カジュアル面接・ワークショップを本業の柱に","posiLabel":"⭐⭐⭐","emotion":"不安（恐れの弱）","positivity":3},{"date":"2026-02-01","title":"ストレングスファインダー分析への関心・家族の体調不良","posiLabel":"⭐⭐⭐","emotion":"関心（期待の弱）","positivity":3},{"date":"2026-02-03","title":"次女の発表会・子供の成長からの刺激","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-02-05","title":"元先輩との対話・手作り感の面白さ・軟着陸","posiLabel":"⭐⭐⭐⭐","emotion":"関心（期待の弱）","positivity":4},{"date":"2026-02-08","title":"週末の憂鬱・ローンの重圧・受け流す姿勢","posiLabel":"⭐⭐⭐","emotion":"物悲しさ（悲しみの弱）","positivity":3},{"date":"2026-02-17","title":"保育園書類完了・年収ダウンへの捉え方の変化","posiLabel":"⭐⭐⭐","emotion":"受容（信頼の弱）","positivity":3},{"date":"2026-02-17","title":"転職活動・データビジネスモデルへの関心","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-02-24","title":"アブダビ出張準備・仮説を立てる楽しさ","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-02-27","title":"旧上司との対話・バイアスへの自戒","posiLabel":"⭐⭐⭐","emotion":"警戒（期待の強）","positivity":3},{"date":"2026-03-09","title":"上司からのフィードバック・焦りと不満","posiLabel":"⭐⭐","emotion":"不満（怒りの弱）","positivity":2},{"date":"2026-03-12","title":"転職面談2件・専門性のギブ・覚悟の言語化","posiLabel":"⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":4},{"date":"2026-03-26","title":"転職活動最終局面・スキルアップデートへの決断","posiLabel":"⭐⭐⭐","emotion":"期待（期待の中）","positivity":3},{"date":"2026-04-01","title":"社会人18年目・娘の新保育園スタート","posiLabel":"⭐⭐⭐","emotion":"物悲しさ（悲しみの弱）","positivity":3},{"date":"2026-04-09","title":"最終面接前・人生の「境目」の感覚","posiLabel":"⭐⭐⭐","emotion":"不安（恐れの弱）","positivity":3},{"date":"2026-04-14","title":"内定への決意・誠実さと戦略の葛藤","posiLabel":"⭐⭐⭐","emotion":"不安（恐れの弱）","positivity":3},{"date":"2026-04-21","title":"転職承諾・契約書へのサイン","posiLabel":"⭐⭐⭐⭐","emotion":"期待（期待の中）","positivity":4},{"date":"2026-05-05","title":"GW最終日・引越し片付け・自分の時間への焦り","posiLabel":"⭐⭐⭐","emotion":"受容（信頼の弱）","positivity":3},{"date":"2026-05-08","title":"家族旅行・高級旅館・卒業への予感","posiLabel":"⭐⭐⭐⭐","emotion":"穏やかさ（喜びの弱）","positivity":4},{"date":"2026-05-14","title":"退職をオープンに・初めて「逆側」に立つ","posiLabel":"⭐⭐⭐","emotion":"物悲しさ（悲しみの弱）","positivity":3},{"date":"2026-05-16","title":"音楽ライブ・ひとつのことを追い続ける強さ","posiLabel":"⭐⭐⭐⭐⭐","emotion":"恍惚（喜びの強）","positivity":5},{"date":"2026-05-24","title":"最終出勤週前日・思考蓄積システムへの情熱","posiLabel":"⭐⭐⭐⭐","emotion":"警戒（期待の強）","positivity":4},{"date":"2026-05-29","title":"送別会・強みへの確信・喪失感","posiLabel":"⭐⭐⭐","emotion":"受容（信頼の弱）","positivity":3},{"date":"2026-06-02","title":"後輩との飲み会・心の通い合いの再発見","posiLabel":"⭐⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":5},{"date":"2026-06-07","title":"家族旅行・「今」を大切にする","posiLabel":"⭐⭐⭐⭐⭐","emotion":"穏やかさ（喜びの弱）","positivity":5},{"date":"2026-06-12","title":"中国旅行からの帰国と「新しい挑戦」へのエネルギー","posiLabel":"⭐⭐⭐⭐","emotion":"関心（期待の弱）","positivity":4},{"date":"2026-06-15","title":"旧オフィスチームとのランチと、信頼関係のデザイン","posiLabel":"⭐⭐⭐⭐","emotion":"崇拝（信頼の強）","positivity":4},{"date":"2026-06-17","title":"新組織の輪郭と新たなスタートへの覚悟","posiLabel":"⭐⭐⭐","emotion":"期待（期待の中）","positivity":3},{"date":"2026-06-17","title":"AIを活用した思考蓄積とリフレクションの手応え","posiLabel":"⭐⭐⭐⭐","emotion":"関心（期待の弱）","positivity":4},{"date":"2026-06-18","title":"送別会・場に応じたつながりのデザイン","posiLabel":"⭐⭐⭐⭐⭐","emotion":"喜び（喜びの中）","positivity":5},{"date":"2026-06-19","title":"陽気な仲間との再会と「自身の存在」の再確認","posiLabel":"⭐⭐⭐⭐","emotion":"穏やかさ（喜びの弱）","positivity":4},{"date":"2026-06-19","title":"技術の進化と「かつての理想」の具現化","posiLabel":"⭐⭐⭐⭐⭐","emotion":"恍惚（喜びの強）","positivity":5}];

// {x: date, y: value} 形式に変換
const posiPoints = entries
  .filter(e => e.positivity !== null)
  .map(e => ({ x: e.date, y: e.positivity, _meta: e }));

// 移動平均（日付順3件）
const movAvgPoints = (() => {
  const valid = entries.filter(e => e.positivity !== null);
  return valid.map((e, i) => {
    const slice = valid.slice(Math.max(0, i - 4), i + 1);
    const avg = slice.reduce((a, b) => a + b.positivity, 0) / slice.length;
    return { x: e.date, y: Math.round(avg * 10) / 10 };
  });
})();

const ctx = document.getElementById('posiChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'ポジ度',
        data: posiPoints,
        borderColor: '#e8a020',
        backgroundColor: 'rgba(232,160,32,0.12)',
        pointBackgroundColor: posiPoints.map(p =>
          p.y >= 4 ? '#27ae60' : p.y <= 2 ? '#e74c3c' : '#e8a020'
        ),
        pointRadius: 6,
        pointHoverRadius: 8,
        tension: 0.3,
        fill: true,
      },
      {
        label: '移動平均（5件）',
        data: movAvgPoints,
        borderColor: '#3498db',
        borderDash: [6, 3],
        pointRadius: 0,
        tension: 0.4,
        fill: false,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: {
        min: 0.5, max: 5.5,
        ticks: {
          stepSize: 1,
          callback: v => ['','⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐⭐'][v] || '',
        },
        grid: { color: 'rgba(0,0,0,0.06)' },
      },
      x: {
        type: 'time',
        time: {
          unit: 'day',
          tooltipFormat: 'yyyy/MM/dd',
          displayFormats: { day: 'M/d', month: 'yyyy/M' },
        },
        ticks: { maxRotation: 45, font: { size: 10 }, autoSkip: true, maxTicksLimit: 20 },
        grid: { display: false },
      }
    },
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 12 } } },
      tooltip: {
        callbacks: {
          title: ctx => ctx[0].raw.x || '',
          label: ctx => {
            const p = ctx.raw;
            if (!p._meta) return '移動平均: ' + p.y;
            return [
              'ポジ度: ' + (p._meta.posiLabel || '-'),
              '主感情: ' + (p._meta.emotion || '-'),
              p._meta.title,
            ];
          }
        }
      }
    }
  }
});
// 月別感情帯グラフ
const monthLabels   = ["1月","2月","3月","4月","5月","6月"];
const emotionDatasets = [{"label":"喜び","data":[18.8,31.3,16.7,12.5,16.7,38.9],"backgroundColor":"#E8C000"},{"label":"信頼","data":[12.5,25,0,25,33.3,22.2],"backgroundColor":"#3EA835"},{"label":"恐れ","data":[12.5,0,33.3,25,0,5.6],"backgroundColor":"#18AAAA"},{"label":"驚き","data":[3.1,0,0,0,0,0],"backgroundColor":"#4458C8"},{"label":"悲しみ","data":[6.3,6.3,0,12.5,33.3,0],"backgroundColor":"#1858C0"},{"label":"嫌悪","data":[0,0,0,0,0,0],"backgroundColor":"#8018A0"},{"label":"怒り","data":[6.3,0,16.7,0,0,0],"backgroundColor":"#C81818"},{"label":"期待","data":[40.6,37.5,33.3,25,16.7,33.3],"backgroundColor":"#E06800"}];

const ctx2 = document.getElementById('emotionChart').getContext('2d');
new Chart(ctx2, {
  type: 'bar',
  data: { labels: monthLabels, datasets: emotionDatasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: {
        stacked: true,
        grid: { display: false },
        ticks: { font: { size: 12 } },
      },
      y: {
        stacked: true,
        min: 0, max: 100,
        ticks: { callback: v => v + '%', font: { size: 11 } },
        grid: { color: 'rgba(0,0,0,0.06)' },
      },
    },
    plugins: {
      legend: {
        position: 'bottom',
        labels: { font: { size: 12 }, padding: 12 },
      },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%',
        },
      },
    },
  },
});
</script>
</body>
</html>
