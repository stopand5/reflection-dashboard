function el(tag, attrs) { const e = document.createElementNS(SVGNS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
// Catmull-Rom → cubic bezier: 点列をなめらかにつなぐパス
function smoothPath(pts) {
  if (pts.length < 2) return '';
  if (pts.length === 2) return `M${pts[0].x},${pts[0].y}L${pts[1].x},${pts[1].y}`;
  let d = `M${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i-1] || pts[i], p1 = pts[i], p2 = pts[i+1], p3 = pts[i+2] || p2;
    const c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
    const c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;
    d += `C${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;
  }
  return d;
}

// ---------- Time series (equal-width months) ----------
(function(){
  const W = 860, H = 340, padL = 34, padR = 14, padT = 16, padB = 40;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const y = v => padT + plotH * (1 - (v-1)/4);

  const months = [...new Set(entries.map(e => e.date.slice(0,7)))].sort();
  const bandW = plotW / months.length;
  const daysIn = mk => { const [Y,M] = mk.split('-').map(Number); return new Date(Y, M, 0).getDate(); };
  // x: each month equal width; position within band by day-of-month, with small inset
  const xOf = e => {
    const mk = e.date.slice(0,7);
    const mi = months.indexOf(mk);
    const day = parseInt(e.date.slice(8,10));
    const frac = (day - 1) / daysIn(mk);
    return padL + bandW * (mi + 0.08 + frac * 0.84);
  };
  const xs = entries.map(xOf);

  // moving average (7 entries); draw only when 7 available
  const mov = entries.map((e,i) => {
    const s = entries.slice(Math.max(0,i-9), i+1).map(z=>z.positivity).filter(v=>v!=null);
    return s.length < 10 ? null : Math.round(s.reduce((a,b)=>a+b,0)/s.length*10)/10;
  });

  const svg = el('svg', { viewBox:`0 0 ${W} ${H}`, role:'img', 'aria-label':'気分スコアの時系列推移' });

  // alternating month band backgrounds + separators + centered labels
  months.forEach((mk, mi) => {
    const bx = padL + bandW * mi;
    if (mi % 2 === 1) svg.appendChild(el('rect', { x:bx, y:padT, width:bandW, height:plotH, fill:cssv('--band') }));
    if (mi > 0) svg.appendChild(el('line', { x1:bx, y1:padT, x2:bx, y2:padT+plotH, stroke:cssv('--line-grid'), 'stroke-width':1 }));
    const t = el('text', { x:bx+bandW/2, y:H-padB+22, 'text-anchor':'middle', 'font-size':11, fill:cssv('--muted') });
    t.textContent = parseInt(mk.slice(5)) + '月'; svg.appendChild(t);
  });

  // horizontal gridlines + y labels
  for (let v=1; v<=5; v++){
    const gy = y(v);
    svg.appendChild(el('line', { x1:padL, y1:gy, x2:W-padR, y2:gy, stroke:cssv('--line-grid'), 'stroke-width':1, opacity:0.7 }));
    const t = el('text', { x:padL-8, y:gy+4, 'text-anchor':'end', 'font-size':11, fill:cssv('--muted') }); t.textContent=v; svg.appendChild(t);
  }

  // moving avg line (solid, smooth curve, segmented across nulls)
  let seg = [];
  const flush = () => { if (seg.length>1) svg.appendChild(el('path', { d:smoothPath(seg), fill:'none', stroke:cssv('--accent'), 'stroke-width':3, 'stroke-linejoin':'round', 'stroke-linecap':'round' })); seg=[]; };
  mov.forEach((v,i)=>{ if (v==null){ flush(); } else { seg.push({x:xs[i], y:y(v)}); } });
  flush();

  // raw dots (点のみ・線でつながない)
  entries.forEach((e,i)=> svg.appendChild(el('circle', { cx:xs[i], cy:y(e.positivity), r:3.2, fill:cssv('--accent-soft'), stroke:cssv('--surface'), 'stroke-width':1 })));

  // hover
  const hoverLine = el('line', { x1:0,y1:padT,x2:0,y2:H-padB, stroke:cssv('--accent'), 'stroke-width':1, opacity:0 });
  const hoverDot = el('circle', { r:5, fill:cssv('--accent'), stroke:cssv('--surface'), 'stroke-width':2, opacity:0 });
  svg.appendChild(hoverLine); svg.appendChild(hoverDot);
  const over = el('rect', { x:padL, y:padT, width:plotW, height:plotH, fill:'transparent' });
  svg.appendChild(over);

  const box = document.getElementById('ts-box');
  box.insertBefore(svg, box.firstChild);
  const tip = document.getElementById('ts-tip');

  function move(clientX){
    const r = svg.getBoundingClientRect();
    const vbX = (clientX - r.left) * (W / r.width);
    let i = 0, best = Infinity;
    for (let k=0; k<xs.length; k++){ const d = Math.abs(xs[k]-vbX); if (d<best){ best=d; i=k; } }
    const e = entries[i], px = xs[i], py = y(e.positivity);
    hoverLine.setAttribute('x1', px); hoverLine.setAttribute('x2', px); hoverLine.setAttribute('opacity', 0.5);
    hoverDot.setAttribute('cx', px); hoverDot.setAttribute('cy', py); hoverDot.setAttribute('opacity', 1);
    tip.style.left = (px * (r.width / W)) + 'px';
    tip.style.top  = (py * (r.height / H)) + 'px';
    const movTxt = mov[i]!=null ? `　移動平均 <b>${mov[i]}</b>` : '';
    tip.innerHTML = `<div class="t-date">${e.date}　${e.posiLabel}</div><div>気分 <b>${e.positivity}</b>　${esc(EMOTION_MAP[e.emotion]||e.emotion)}${movTxt}</div><div class="t-title">${esc(e.title)}</div>`;
    tip.style.opacity = 1;
  }
  over.addEventListener('mousemove', ev => move(ev.clientX));
  over.addEventListener('mouseleave', () => { tip.style.opacity=0; hoverLine.setAttribute('opacity',0); hoverDot.setAttribute('opacity',0); });
  svg.addEventListener('touchstart', ev => move(ev.touches[0].clientX), {passive:true});
  svg.addEventListener('touchmove', ev => move(ev.touches[0].clientX), {passive:true});
})();

// ---------- Monthly emotion ratio (main + sub) ----------
(function(){
  const monthMap = {};
  entries.forEach(e => {
    const m = e.date.slice(0,7);
    for (const raw of [e.emotion, e.emotion2]) {
      const base = EMOTION_MAP[raw]; if (!base) continue;
      (monthMap[m] = monthMap[m] || {});
      monthMap[m][base] = (monthMap[m][base]||0) + weightOf(raw);
    }
  });
  const months = Object.keys(monthMap).sort();
  const W = 860, H = 300, padL = 16, padR = 16, padT = 10, padB = 30;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const step = plotW/months.length;
  const bw = Math.min(66, step*0.62);
  const svg = el('svg', { viewBox:`0 0 ${W} ${H}`, role:'img', 'aria-label':'月別感情比率' });

  months.forEach((m,mi) => {
    const counts = monthMap[m];
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    const cx = padL + step*mi + step/2;
    let acc = 0;
    EMOTIONS_8.forEach(emo => {
      const val = counts[emo]||0; if (!val) return;
      const h = (val/total)*plotH;
      svg.appendChild(el('rect', { x:cx-bw/2, y:padT+plotH-acc-h, width:bw, height:Math.max(0.5,h), fill:cssv(EMO_VAR[emo]), rx:1.5 }));
      acc += h;
    });
    const t = el('text', { x:cx, y:H-padB+20, 'text-anchor':'middle', 'font-size':11.5, fill:cssv('--muted') });
    t.textContent = parseInt(m.slice(5))+'月'; svg.appendChild(t);
  });
  document.getElementById('em-box').appendChild(svg);
  document.getElementById('em-legend').innerHTML = EMOTIONS_8.map(emo =>
    `<span class="item"><span class="swatch" style="background:var(${EMO_VAR[emo]})"></span>${emo}</span>`).join('');
})();

// ---------- Emotion wheel (Plutchik) ----------
(function(){
  const HALF = Math.PI/8;
  const RINGS = [{r1:36,r2:90},{r1:90,r2:152},{r1:152,r2:212}]; // 0=強(内),1=中,2=弱(外)
  const SECTORS = [
    { a:-Math.PI/2,   lbl:'喜び',  c:['#B8960A','#E8C000','#FFF0A0'], e:['恍惚（喜びの強）','喜び（喜びの中）','穏やかさ（喜びの弱）'] },
    { a:-Math.PI/4,   lbl:'信頼',  c:['#1A6018','#3EA835','#BAEAB8'], e:['崇拝（信頼の強）','信頼（信頼の中）','受容（信頼の弱）'] },
    { a:0,            lbl:'恐れ',  c:['#006868','#18AAAA','#A4E2E2'], e:['恐怖（恐れの強）','恐れ（恐れの中）','不安（恐れの弱）'] },
    { a:Math.PI/4,    lbl:'驚き',  c:['#243898','#4458C8','#B8C2EE'], e:['驚嘆（驚きの強）','驚き（驚きの中）','動揺（驚きの弱）'] },
    { a:Math.PI/2,    lbl:'悲しみ',c:['#0A2880','#1858C0','#A4C0EC'], e:['悲嘆（悲しみの強）','悲しみ（悲しみの中）','物悲しさ（悲しみの弱）'] },
    { a:3*Math.PI/4,  lbl:'嫌悪',  c:['#4E0E78','#8018A0','#D4A8E8'], e:['憎悪（嫌悪の強）','嫌悪（嫌悪の中）','倦怠（嫌悪の弱）'] },
    { a:Math.PI,      lbl:'怒り',  c:['#800808','#C81818','#EEAAAA'], e:['激怒（怒りの強）','怒り（怒りの中）','不満（怒りの弱）'] },
    { a:-3*Math.PI/4, lbl:'期待',  c:['#A84000','#E06800','#FFD4A0'], e:['警戒（期待の強）','期待（期待の中）','関心（期待の弱）'] },
  ];
  // 出現数カウント（主感情＋副感情）
  const counts = {};
  entries.forEach(e => { for (const x of [e.emotion, e.emotion2]) { if (x) counts[x] = (counts[x]||0)+1; } });

  // 直近30日の詳細感情カウント（重ねバブル用）
  const cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate()-30);
  const countsRec = {};
  entries.forEach(e => {
    if (new Date(e.date) < cutoff30) return;
    for (const x of [e.emotion, e.emotion2]) { if (x) countsRec[x] = (countsRec[x]||0)+1; }
  });

  const W = 600, H = 600, cx = 300, cy = 300;
  const svg = el('svg', { viewBox:`0 0 ${W} ${H}`, role:'img', 'aria-label':'感情の輪' });
  const P = (r,a) => [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  const annular = (r1,r2,a1,a2) => {
    const [x1,y1]=P(r2,a1),[x2,y2]=P(r2,a2),[x3,y3]=P(r1,a2),[x4,y4]=P(r1,a1);
    return `M${x1},${y1} A${r2},${r2} 0 0 1 ${x2},${y2} L${x3},${y3} A${r1},${r1} 0 0 0 ${x4},${y4} Z`;
  };
  // セグメント
  SECTORS.forEach(s => RINGS.forEach((r,ri) => {
    svg.appendChild(el('path', { d:annular(r.r1,r.r2,s.a-HALF,s.a+HALF), fill:s.c[ri], stroke:'rgba(255,255,255,0.85)', 'stroke-width':1.5 }));
  }));
  // ペタル先端
  SECTORS.forEach(s => {
    const [x1,y1]=P(212,s.a-HALF),[xt,yt]=P(250,s.a),[x2,y2]=P(212,s.a+HALF);
    svg.appendChild(el('path', { d:`M${x1},${y1} L${xt},${yt} L${x2},${y2} Z`, fill:s.c[2], 'fill-opacity':0.38, stroke:'rgba(255,255,255,0.5)', 'stroke-width':1 }));
  });
  // 中心円
  svg.appendChild(el('circle', { cx, cy, r:34, fill:cssv('--surface') }));
  // 累計バブル（淡い足あと）＋ 直近30日バブル（明るく重ねる）
  SECTORS.forEach(s => RINGS.forEach((r,ri) => {
    const nAll = counts[s.e[ri]]||0; if (!nAll) return;
    const midR = (r.r1+r.r2)/2, [px,py]=P(midR, s.a);
    const rAll = Math.sqrt(nAll)*4+5;
    // 累計＝淡い足あと
    svg.appendChild(el('circle', { cx:px, cy:py, r:rAll, fill:cssv('--ink'), 'fill-opacity':0.13, stroke:cssv('--surface'), 'stroke-opacity':0.5, 'stroke-width':1 }));
    // 直近30日＝白い丸＋感情色の輪郭＋件数
    const nRec = countsRec[s.e[ri]]||0;
    if (nRec > 0) {
      const rRec = Math.sqrt(nRec)*4+5;
      svg.appendChild(el('circle', { cx:px, cy:py, r:rRec, fill:'#ffffff', stroke:s.c[0], 'stroke-width':2.5 }));
      const t = el('text', { x:px, y:py, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':(rRec>12?12:rRec>9?10:8.5), 'font-weight':700, fill:'#333' });
      t.textContent = nRec; svg.appendChild(t);
    }
  }));
  // セクターラベル
  SECTORS.forEach(s => {
    const [lx,ly]=P(262, s.a);
    const t = el('text', { x:lx, y:ly, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':20, 'font-weight':700, fill:cssv('--ink') });
    t.textContent = s.lbl; svg.appendChild(t);
  });
  document.getElementById('wheel-box').appendChild(svg);
})();

// ---------- Day of week average ----------
(function(){
  const ORDER = [1,2,3,4,5,6,0], LBL = ['月','火','水','木','金','土','日'];
  const map = {};
  entries.forEach(e => { if (e.positivity==null) return; const d = new Date(e.date).getDay(); (map[d]=map[d]||[]).push(e.positivity); });
  const avg = ORDER.map(d => map[d] ? map[d].reduce((a,b)=>a+b,0)/map[d].length : null);
  const cnt = ORDER.map(d => map[d] ? map[d].length : 0);
  const W = 860, H = 240, padL = 16, padR = 16, padT = 14, padB = 44;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const step = plotW/7, bw = Math.min(64, step*0.56);
  const svg = el('svg', { viewBox:`0 0 ${W} ${H}`, role:'img', 'aria-label':'曜日別平均気分スコア' });
  svg.appendChild(el('line', { x1:padL, y1:padT+plotH, x2:W-padR, y2:padT+plotH, stroke:cssv('--line-grid'), 'stroke-width':1 }));
  ORDER.forEach((d,i) => {
    const cx = padL + step*i + step/2;
    const v = avg[i];
    const h = v!=null ? (v/5)*plotH : 0;
    const yTop = padT+plotH-h;
    const isWknd = d===0 || d===6;
    svg.appendChild(el('rect', { x:cx-bw/2, y:yTop, width:bw, height:Math.max(1,h), rx:5, fill: v==null?cssv('--line-grid'):(isWknd?cssv('--accent-soft'):cssv('--accent')) }));
    const t1 = el('text', { x:cx, y:yTop-8, 'text-anchor':'middle', 'font-size':13, 'font-weight':700, fill:cssv('--ink') }); t1.textContent = v!=null?v.toFixed(1):'–'; svg.appendChild(t1);
    const t2 = el('text', { x:cx, y:H-padB+22, 'text-anchor':'middle', 'font-size':13, 'font-weight':700, fill:cssv('--ink-soft') }); t2.textContent = LBL[i]; svg.appendChild(t2);
    const t3 = el('text', { x:cx, y:H-padB+38, 'text-anchor':'middle', 'font-size':10.5, fill:cssv('--muted') }); t3.textContent = cnt[i]+'件'; svg.appendChild(t3);
  });
  document.getElementById('dow-box').appendChild(svg);
})();


// re-render on theme toggle so CSS-var colors refresh
new MutationObserver(() => location.reload())
  .observe(document.documentElement, { attributes:true, attributeFilter:['data-theme'] });
</script>
